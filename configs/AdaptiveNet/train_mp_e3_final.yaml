defaults:
  - model: e3_density
  - data: mp_data
  - override hydra/launcher: submitit_slurm
  - _self_

# number of nodes
nnodes: 1
# number of processes/devices per node
nprocs: 4

# training steps
steps: 1e6

# (optional) save cubes on test
cube_dir:

# checkpoint, will resume training if path exists
checkpoint_path: #models/charge3net_mp.pt

# tensorboard, logs, and tmp files
log_dir: ${hydra:run.dir}

seed: 42
cutoff: 4.0
batch_size: 16
split: "split"
lr: 0.005
spin: False
only_spin: False
mag: False

hydra:
  job:
    name: mp_e3_final
  run:
    dir: ./results/${hydra.job.name}/${now:%Y-%m-%d-%H-%M-%S}
  sweep:
    dir: ${hydra.run.dir}

  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit
    partition: gpu
    nodes: ${nnodes}
    tasks_per_node: 4 # note, multiprocessing will handle multitasking per node
    #constraint: xeon-g6
    timeout_min: 288000
    cpus_per_task: 8
    #exclude: node[1-2]
    additional_parameters:
      gres: gpu:4
      exclusive: True
      distribution: nopack
  callbacks:
    log_job_return:
      _target_: hydra.experimental.callbacks.LogJobReturnCallback



