data:
  batch_size: ${batch_size}
  train_workers: 8
  val_workers: 8
  pin_memory: False
  train_probes: 200
  val_probes: 400
  test_probes: 1000
  spin: ${spin}
  mag: ${mag}
  split_file: ./data/mp/${split}.json
  graph_constructor:
    cutoff: ${cutoff}
    disable_pbc: False


model:
  optimizer:
    lr: ${lr}
  lr_scheduler:
    beta: 3e3
  model:
    cutoff: ${cutoff}
    spin: ${spin}
    mag: ${mag}
