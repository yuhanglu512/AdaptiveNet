defaults:
  - model: e3_density
  - data: mp_data
  - override hydra/launcher: submitit_slurm
  - _self_

input_dir: ./data/mp # arbitrary directory containing .npy and .pkl files, with filelist.txt, split.json, and probe_counts.csv 
lmax: 4
checkpoint_path: ./models/charge3net_mag_dens.pt
cube_dir: ${hydra:run.dir}

# tensorboard, logs, and tmp files
log_dir: ${hydra:run.dir}

# number of nodes
nnodes: 1
# number of processes/devices per node
nprocs: 1


seed: 42
cutoff: 4.0
batch_size: 1
lr: 0.005
spin: True
only_spin: True
mag: False

hydra:
  job:
    name: mp_e3_inference
  run:
    dir: ./results/${hydra.job.name}/${now:%Y-%m-%d-%H-%M-%S}
  sweep:
    dir: ${hydra.run.dir}

  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit
    partition: gnode
    nodes: ${nnodes}
    tasks_per_node: 1 # note, multiprocessing will handle multitasking per node
    #constraint: xeon-g6
    timeout_min: 288000
    cpus_per_task: 20
    exclude: node[1-2]
    additional_parameters:
      gres: gpu:RTX3090:1
      #exclusive: True
      distribution: nopack
  callbacks:
    log_job_return:
      _target_: hydra.experimental.callbacks.LogJobReturnCallback

