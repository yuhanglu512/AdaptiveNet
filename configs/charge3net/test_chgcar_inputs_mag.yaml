data:
  batch_size: ${batch_size}
  train_workers: 0
  val_workers: 0
  pin_memory: False
  train_probes: 200
  val_probes: 400
  test_probes: 1000
  spin: ${spin}
  mag: ${mag}
  q: ${q}
  density: ${density}
  data_root: ${input_dir}/filelist.txt
  split_file: ${input_dir}/split.json
  grid_size_file: ${input_dir}/probe_counts.csv
  graph_constructor:
    _target_: src.charge3net.data.graph_construction.AtomGraphConstructor
    cutoff: ${cutoff}
    disable_pbc: False


model:
  optimizer:
    lr: ${lr}
  lr_scheduler:
    beta: 3e3
  model:
    cutoff: ${cutoff}
    num_interactions: 3
    num_neighbors: 20
    lmax: 4

